[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "summit"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "garminconnect==0.2.38",
    "komPYoot>=1.0.5",
    "gpxpy>=1.6.1",
    "lxml>=4.9.0",
    "requests>=2.31.0",
]

[project.scripts]
summit-prs          = "summit.prs:main"
summit-kom          = "summit.kom:main"
summit-activities   = "summit.activities:main"
summit-check        = "summit.updates:main"
summit-setup        = "summit.cli.setup:main"
summit-update       = "summit.cli.update:main"
summit-generate     = "summit.cli.generate:main"
summit-auto-update  = "summit.cli.auto_update:main"
komoot              = "summit.komoot:main"

[tool.hatch.build.targets.wheel]
packages = ["src/summit"]
